<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FX App — Convert</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <header class="topbar">
    <span class="brand"><span class="fx">FX</span> App</span>
    <nav class="menu">
      <a href="index.html">Welcome</a>
      <a href="currencies.html">Currencies</a>
      <a href="rates.html">Rates</a>
      <a href="convert.html" class="active">Convert</a>
      <a href="#" class="todo">History</a>
    </nav>
  </header>

  <main>
    <h1>Currency converter</h1>
    <p class="lede">
      Enter an amount and choose a currency pair to see the converted value, fee, and total.
    </p>

    <div class="panel">
      <form id="convert-form" autocomplete="off">
        <label for="base">From</label>
        <select id="base" name="base">
          <option value="EUR">EUR – Euro</option>
          <option value="USD">USD – US Dollar</option>
          <option value="GBP">GBP – Pound Sterling</option>
          <option value="AUD">AUD – Australian Dollar</option>
          <option value="CAD">CAD – Canadian Dollar</option>
          <option value="JPY">JPY – Japanese Yen</option>
          <option value="CHF">CHF – Swiss Franc</option>
          <option value="SGD">SGD – Singapore Dollar</option>
        </select>
        <label for="quote">To</label>
        <select id="quote" name="quote">
          <option value="USD">USD – US Dollar</option>
          <option value="EUR">EUR – Euro</option>
          <option value="GBP">GBP – Pound Sterling</option>
          <option value="AUD">AUD – Australian Dollar</option>
          <option value="CAD">CAD – Canadian Dollar</option>
          <option value="JPY">JPY – Japanese Yen</option>
          <option value="CHF">CHF – Swiss Franc</option>
          <option value="SGD">SGD – Singapore Dollar</option>
        </select>
        <label for="amount">Amount</label>
        <input id="amount" name="amount" type="number" min="0.01" step="0.01" placeholder="e.g. 100" required>
        <button type="submit">Convert</button>
      </form>
      <p id="form-status" class="status"></p>
    </div>

    <div id="result-panel" class="panel" style="display:none">
      <table>
        <thead>
          <tr><th>Field</th><th>Value</th></tr>
        </thead>
        <tbody id="result-rows"></tbody>
      </table>
    </div>
  </main>

  <script src="/js/convert.js"></script>
</body>
</html>
