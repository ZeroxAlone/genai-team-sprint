<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FX App — Exchange Rates</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <header class="topbar">
    <span class="brand"><span class="fx">FX</span> App</span>
    <nav class="menu">
      <a href="/">Welcome</a>
      <a href="/currencies.html">Currencies</a>
      <a href="/rates.html" class="active">Rates</a>
      <a href="#" class="todo">Convert</a>
      <a href="#" class="todo">History</a>
    </nav>
  </header>

  <main>
    <h1>Latest Exchange Rates</h1>
    <p class="lede">
      The latest exchange rate for each currency pair, read from <span class="mono">GET /api/rates</span>.
      Each row shows the most recent rate_date per (base, quote) pair.
    </p>

    <div class="panel">
      <table>
        <thead>
          <tr><th>Base</th><th>Quote</th><th>Rate</th><th>Date</th></tr>
        </thead>
        <tbody id="rows">
          <tr><td colspan="4" class="status">Loading…</td></tr>
        </tbody>
      </table>
      <p id="status" class="status"></p>
    </div>
  </main>

  <script src="/js/rates.js"></script>
</body>
</html>
